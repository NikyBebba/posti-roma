<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Posti Roma</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  :root{
    --bg:#EFE4CD;
    --paper:#FBF5E7;
    --ink:#241C15;
    --ink-soft:#5A4E3F;
    --red:#A13F27;
    --red-dark:#7A2C1B;
    --gold:#B0862A;
    --olive:#5B6B3C;
    --line:#D9C9A3;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    background-image:
      radial-gradient(circle at 20% 10%, rgba(161,63,39,0.05), transparent 40%),
      radial-gradient(circle at 90% 30%, rgba(176,134,42,0.06), transparent 45%);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    padding-bottom:40px;
  }

  header{
    padding:24px 18px 14px;
    text-align:center;
  }
  header::after{
    content:"";
    display:block;
    width:120px;
    height:2px;
    background:var(--gold);
    margin:14px auto 0;
    opacity:.6;
  }
  h1{
    font-family:'Cormorant Garamond', serif;
    font-weight:600;
    font-size:2.4rem;
    letter-spacing:0.06em;
    margin:0;
    color:var(--ink);
  }
  h1 span{color:var(--red);font-style:italic;}
  .subtitle{
    font-family:'Oswald', sans-serif;
    font-size:.66rem;
    letter-spacing:.22em;
    text-transform:uppercase;
    color:var(--ink-soft);
    margin-top:6px;
  }

  .view-toggle{
    display:flex;
    justify-content:center;
    gap:0;
    margin:14px auto 0;
    width:fit-content;
    border:1.5px solid var(--ink);
    border-radius:20px;
    overflow:hidden;
  }
  .view-toggle button{
    font-family:'Oswald',sans-serif;
    font-size:.7rem;
    letter-spacing:.08em;
    text-transform:uppercase;
    padding:7px 20px;
    border:none;
    background:var(--paper);
    color:var(--ink);
    cursor:pointer;
  }
  .view-toggle button.active{
    background:var(--ink);
    color:var(--paper);
  }
  .suggest-link{
    display:block;
    margin:10px auto 0;
    background:none;
    border:none;
    font-family:'Oswald',sans-serif;
    font-size:.68rem;
    letter-spacing:.06em;
    text-transform:uppercase;
    color:var(--ink-soft);
    text-decoration:underline;
    text-underline-offset:3px;
    cursor:pointer;
  }
  .suggest-link:hover{color:var(--red);}

  .controls{
    position:sticky;
    top:0;
    z-index:20;
    background:var(--bg);
    padding:10px 14px 12px;
    border-bottom:1px solid var(--line);
    box-shadow:0 6px 14px -10px rgba(0,0,0,.25);
  }
  .search-row{
    display:flex;
    gap:8px;
    margin-bottom:10px;
  }
  #search{
    flex:1;
    font-family:'Inter',sans-serif;
    font-size:.95rem;
    padding:10px 14px;
    border-radius:3px;
    border:1px solid var(--line);
    background:var(--paper);
    color:var(--ink);
    outline:none;
  }
  #search:focus{border-color:var(--red);}
  .fav-filter-btn{
    font-family:'Oswald',sans-serif;
    font-size:.66rem;
    letter-spacing:.05em;
    text-transform:uppercase;
    white-space:nowrap;
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:3px;
    padding:0 10px;
    color:var(--ink-soft);
    cursor:pointer;
  }
  .fav-filter-btn.active{
    background:var(--gold);
    color:var(--paper);
    border-color:var(--gold);
  }

  .tabs{
    display:flex;
    gap:6px;
    overflow-x:auto;
    padding-bottom:10px;
    scrollbar-width:none;
  }
  .tabs::-webkit-scrollbar{display:none;}
  .tab{
    font-family:'Oswald',sans-serif;
    font-size:.7rem;
    letter-spacing:.06em;
    text-transform:uppercase;
    white-space:nowrap;
    padding:7px 14px;
    border-radius:20px;
    border:1px solid var(--line);
    background:var(--paper);
    color:var(--ink-soft);
    cursor:pointer;
    flex:0 0 auto;
  }
  .tab.active{
    background:var(--ink);
    color:var(--paper);
    border-color:var(--ink);
  }

  .zones{
    display:flex;
    gap:8px;
    overflow-x:auto;
    padding:4px 2px 4px;
    scrollbar-width:none;
  }
  .zones::-webkit-scrollbar{display:none;}
  .targa{
    position:relative;
    flex:0 0 auto;
    font-family:'Oswald',sans-serif;
    font-weight:600;
    font-size:.64rem;
    letter-spacing:.05em;
    text-transform:uppercase;
    background:var(--paper);
    color:var(--ink);
    border:1.5px solid var(--ink);
    border-radius:2px;
    padding:6px 12px;
    cursor:pointer;
    box-shadow:1px 1px 0 rgba(36,28,21,.18);
  }
  .targa::before, .targa::after{
    content:"";
    position:absolute;
    top:3px;
    width:3px;
    height:3px;
    border-radius:50%;
    background:var(--ink-soft);
    opacity:.6;
  }
  .targa::before{left:4px;}
  .targa::after{right:4px;}
  .targa.active{
    background:var(--red);
    border-color:var(--red-dark);
    color:var(--paper);
  }
  .targa.active::before, .targa.active::after{
    background:rgba(255,255,255,.7);
  }

  .count{
    font-family:'Oswald',sans-serif;
    font-size:.64rem;
    letter-spacing:.1em;
    text-transform:uppercase;
    color:var(--ink-soft);
    padding:14px 18px 4px;
  }
  .list{
    padding:6px 14px 20px;
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .card{
    position:relative;
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:4px;
    padding:13px 16px;
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:10px;
    overflow:hidden;
    animation:fade .25s ease;
  }
  @keyframes fade{from{opacity:0;transform:translateY(3px);}to{opacity:1;transform:none;}}
  .card-main{min-width:0;}
  .card-name{
    font-family:'Cormorant Garamond',serif;
    font-weight:600;
    font-size:1.22rem;
    line-height:1.2;
  }
  .card-meta{
    font-family:'Oswald',sans-serif;
    font-size:.63rem;
    letter-spacing:.05em;
    text-transform:uppercase;
    color:var(--ink-soft);
    margin-top:3px;
    display:flex;
    align-items:center;
    gap:6px;
  }
  .pin-dot{
    width:6px;height:6px;border-radius:50%;
    background:var(--olive);
    flex:0 0 auto;
  }
  .pin-dot.nogeo{background:var(--line);}
  .card-note{
    font-family:'Inter',sans-serif;
    font-size:.82rem;
    color:var(--ink-soft);
    margin-top:5px;
    font-style:italic;
  }
  .card-tags{margin-top:6px;font-size:.95rem;}

  .fav-btn{
    flex:0 0 auto;
    width:38px;
    height:38px;
    border-radius:50%;
    border:1.5px solid var(--line);
    background:transparent;
    color:var(--line);
    font-size:1.15rem;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
  }
  .card.favorite{background:#FBF1DC; box-shadow:inset 3px 0 0 var(--gold);}
  .card.favorite .fav-btn{
    border-color:var(--gold);
    background:var(--gold);
    color:var(--paper);
  }


  .modal-overlay{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(36,28,21,.55);
    z-index:50;
    align-items:flex-end;
    justify-content:center;
  }
  .modal-overlay.active{display:flex;}
  .modal{
    background:var(--paper);
    width:100%;
    max-width:480px;
    max-height:88vh;
    overflow-y:auto;
    border-radius:14px 14px 0 0;
    padding:20px 20px 24px;
    box-shadow:0 -6px 24px rgba(0,0,0,.3);
  }
  .modal h2{
    font-family:'Cormorant Garamond',serif;
    font-weight:600;
    font-size:1.5rem;
    margin:0 0 14px;
  }
  .field{margin-bottom:12px;}
  .field label{
    display:block;
    font-family:'Oswald',sans-serif;
    font-size:.62rem;
    letter-spacing:.08em;
    text-transform:uppercase;
    color:var(--ink-soft);
    margin-bottom:4px;
  }
  .field input, .field select, .field textarea{
    width:100%;
    font-family:'Inter',sans-serif;
    font-size:.9rem;
    padding:9px 11px;
    border-radius:4px;
    border:1px solid var(--line);
    background:#fff;
    color:var(--ink);
    box-sizing:border-box;
  }
  .field textarea{resize:vertical;min-height:50px;}
  .cat-checks{display:flex;flex-wrap:wrap;gap:6px;}
  .cat-chk{
    display:inline-flex;
    align-items:center;
    gap:5px;
    font-family:'Oswald',sans-serif;
    font-size:.68rem;
    letter-spacing:.03em;
    text-transform:uppercase;
    padding:6px 10px;
    border-radius:16px;
    border:1.3px solid var(--line);
    background:#fff;
    cursor:pointer;
    user-select:none;
  }
  .cat-chk input{margin:0;accent-color:var(--red);}
  .cat-chk.checked{border-color:var(--red); background:#fbe9e3;}
  .field-row{display:flex;gap:10px;}
  .field-row .field{flex:1;}
  .modal-actions{
    display:flex;
    gap:10px;
    margin-top:16px;
  }
  .modal-btn{
    flex:1;
    font-family:'Oswald',sans-serif;
    font-size:.72rem;
    letter-spacing:.06em;
    text-transform:uppercase;
    padding:11px;
    border-radius:20px;
    border:1.5px solid var(--ink);
    cursor:pointer;
    background:var(--paper);
    color:var(--ink);
  }
  .modal-btn.primary{background:var(--ink);color:var(--paper);}
  .modal-btn.danger{border-color:var(--red-dark);color:var(--red);}
  .modal-hint{font-size:.72rem;color:var(--ink-soft);margin:-6px 0 12px;}

  .empty{
    text-align:center;
    padding:60px 20px;
    color:var(--ink-soft);
    font-family:'Cormorant Garamond',serif;
    font-style:italic;
    font-size:1.2rem;
  }

  #mapWrap{display:none;}
  #mapWrap.active{display:block;}
  #map{
    height:calc(100vh - 230px);
    min-height:400px;
    width:100%;
    border-top:1px solid var(--line);
  }
  .leaflet-popup-content-wrapper{
    background:var(--paper);
    border-radius:4px;
    font-family:'Inter',sans-serif;
  }
  .popup-name{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:1.15rem;}
  .popup-meta{font-family:'Oswald',sans-serif;font-size:.62rem;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-soft);margin-top:2px;}
  .popup-note{font-size:.8rem;font-style:italic;color:var(--ink-soft);margin-top:4px;}
  .popup-fav{
    margin-top:8px;
    font-family:'Oswald',sans-serif;
    font-size:.65rem;
    letter-spacing:.05em;
    text-transform:uppercase;
    padding:5px 10px;
    border-radius:14px;
    border:1px solid var(--ink);
    background:var(--paper);
    cursor:pointer;
  }
  .popup-fav.on{background:var(--gold);color:var(--paper);border-color:var(--gold);}

  .listWrap.hidden{display:none;}

  footer{
    text-align:center;
    font-family:'Oswald',sans-serif;
    font-size:.6rem;
    letter-spacing:.1em;
    text-transform:uppercase;
    color:var(--ink-soft);
    padding:20px;
    opacity:.6;
  }
</style>
</head>
<body>

<header>
  <h1>Posti <span>Roma</span></h1>
  <div class="subtitle">dove si mangia e si beve — la guida</div>
  <div class="view-toggle">
    <button id="btnList" class="active">Lista</button>
    <button id="btnMap">Mappa</button>
  </div>
  <button class="suggest-link" id="btnSuggest">✉️ Proponi un posto</button>
</header>

<div class="controls">
  <div class="search-row">
    <input id="search" type="text" placeholder="Cerca un nome, una zona…">
    <button class="fav-filter-btn" id="onlyFavBtn">⭐ Solo preferiti</button>
  </div>
  <div class="tabs" id="sources"></div>
  <div class="tabs" id="tabs"></div>
  <div class="zones" id="zones"></div>
</div>

<div class="listWrap" id="listWrap">
  <div class="count" id="count"></div>
  <div class="list" id="list"></div>
</div>

<div id="mapWrap">
  <div id="map"></div>
</div>


<div class="modal-overlay" id="suggestOverlay">
  <div class="modal">
    <h2>Proponi un posto</h2>
    <div class="modal-hint">Compila il modulo: si aprirà la tua app email con un messaggio già pronto da inviare. Nessun dato viene salvato qui — decido io se aggiungerlo alla guida.</div>
    <div class="field">
      <label>Nome del posto</label>
      <input type="text" id="sName" placeholder="Es. Trattoria da...">
    </div>
    <div class="field">
      <label>Categorie (puoi selezionarne più di una)</label>
      <div class="cat-checks" id="sCatBox"></div>
    </div>
    <div class="field">
      <label>Zona</label>
      <select id="sZone"></select>
    </div>
    <div class="field">
      <label>Perché lo consigli / indirizzo</label>
      <textarea id="sNote" placeholder="Cosa si mangia/beve, indirizzo, un aneddoto…"></textarea>
    </div>
    <div class="field">
      <label>Il tuo nome (opzionale)</label>
      <input type="text" id="sFrom" placeholder="Così sappiamo chi l'ha proposto">
    </div>
    <div class="modal-actions">
      <button class="modal-btn" id="sCancel">Annulla</button>
      <button class="modal-btn primary" id="sSend">Invia proposta</button>
    </div>
  </div>
</div>

<footer>SPQR · appunti personali, non un giudizio ufficiale</footer>

places = places.concat(rsPlaces.map(p=>({...p, source:'rs'})));

function slug(s){return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'');}
places = places.map((p,i)=>({...p, id: slug(p.n)+'-'+i}));

let basePlaces = places; // built-in (mio + rs), fixed ids
const CAT_TAGS = {ape:'🍹', pranzo:'🍽️', forno:'🍕', gelato:'🍦', pasticceria:'🥐', shop_food:'🧺', shop:'🛍️', explore:'📍', musica:'🎵'};

let state = { cat:'all', zone:null, source:'all', q:'', onlyFavorites:false, favorites:{}, view:'list' };
let leafletMap = null;
let markersLayer = null;

const LS_PREFIX = 'posti-roma:';
function lsGet(key, fallback){
  try{
    const raw = localStorage.getItem(LS_PREFIX + key);
    return raw != null ? JSON.parse(raw) : fallback;
  }catch(e){ return fallback; }
}
function lsSet(key, value){
  try{ localStorage.setItem(LS_PREFIX + key, JSON.stringify(value)); }
  catch(e){ console.error('localStorage error', e); }
}

function loadAllData(){
  state.favorites = lsGet('favorites-map', {});
  render();
}

function saveFavorites(){ lsSet('favorites-map', state.favorites); }

function toggleFavorite(id){
  if(state.favorites[id]) delete state.favorites[id];
  else state.favorites[id] = true;
  render();
  saveFavorites();
}

const tabsEl = document.getElementById('tabs');
CATS.forEach(cat=>{
  const b=document.createElement('button');
  b.className='tab'+(cat.id==='all'?' active':'');
  b.textContent=cat.label;
  b.onclick=()=>{state.cat=cat.id; syncTabs(); render();};
  b.dataset.id=cat.id;
  tabsEl.appendChild(b);
});
function syncTabs(){
  [...tabsEl.children].forEach(b=>b.classList.toggle('active', b.dataset.id===state.cat));
}

const sourcesEl = document.getElementById('sources');
SOURCES.forEach(s=>{
  const b=document.createElement('button');
  b.className='tab'+(s.id==='all'?' active':'');
  b.textContent=s.label;
  b.onclick=()=>{state.source=s.id; syncSources(); render();};
  b.dataset.id=s.id;
  sourcesEl.appendChild(b);
});
function syncSources(){
  [...sourcesEl.children].forEach(b=>b.classList.toggle('active', b.dataset.id===state.source));
}

const zonesEl = document.getElementById('zones');
ZONES.forEach(z=>{
  const b=document.createElement('button');
  b.className='targa';
  b.textContent=z;
  b.onclick=()=>{
    state.zone = (state.zone===z) ? null : z;
    syncZones();
    render();
  };
  b.dataset.zone=z;
  zonesEl.appendChild(b);
});
function syncZones(){
  [...zonesEl.children].forEach(b=>b.classList.toggle('active', b.dataset.zone===state.zone));
}

document.getElementById('search').addEventListener('input', e=>{
  state.q = e.target.value.trim().toLowerCase();
  render();
});

const onlyFavBtn = document.getElementById('onlyFavBtn');
onlyFavBtn.onclick=()=>{
  state.onlyFavorites = !state.onlyFavorites;
  onlyFavBtn.classList.toggle('active', state.onlyFavorites);
  render();
};

const btnList = document.getElementById('btnList');
const btnMap = document.getElementById('btnMap');
const listWrap = document.getElementById('listWrap');
const mapWrap = document.getElementById('mapWrap');

btnList.onclick=()=>{
  state.view='list';
  btnList.classList.add('active'); btnMap.classList.remove('active');
  listWrap.classList.remove('hidden'); mapWrap.classList.remove('active');
};
btnMap.onclick=()=>{
  state.view='map';
  btnMap.classList.add('active'); btnList.classList.remove('active');
  listWrap.classList.add('hidden'); mapWrap.classList.add('active');
  setTimeout(()=>{
    if(!leafletMap) initMap();
    leafletMap.invalidateSize();
    render();
  }, 30);
};

function initMap(){
  leafletMap = L.map('map', {zoomControl:true}).setView([41.9028, 12.4964], 12);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(leafletMap);
  markersLayer = L.layerGroup().addTo(leafletMap);
}

function getFiltered(){
  return basePlaces.filter(p=>{
    if(state.cat!=='all' && !p.cats.includes(state.cat)) return false;
    if(state.zone && p.z!==state.zone) return false;
    if(state.source!=='all' && p.source!==state.source) return false;
    if(state.onlyFavorites && !state.favorites[p.id]) return false;
    if(state.q){
      const hay = (p.n+' '+p.z+' '+p.note).toLowerCase();
      if(!hay.includes(state.q)) return false;
    }
    return true;
  });
}

const listEl = document.getElementById('list');
const countEl = document.getElementById('count');

function render(){
  const items = getFiltered();
  countEl.textContent = items.length + (items.length===1 ? ' posto trovato' : ' posti trovati');

  listEl.innerHTML='';
  if(items.length===0){
    const e=document.createElement('div');
    e.className='empty';
    e.textContent='Nessun posto trovato — prova a cambiare filtro.';
    listEl.appendChild(e);
  } else {
    items.forEach(p=>{
      const fav = !!state.favorites[p.id];
      const hasGeo = p.lat && p.lng;
      const card=document.createElement('div');
      card.className='card'+(fav?' favorite':'');
      card.innerHTML = `
        <div class="card-main">
          <div class="card-name">${p.n}</div>
          <div class="card-meta"><span class="pin-dot ${hasGeo?'':'nogeo'}"></span>${p.z}</div>
          ${p.note ? `<div class="card-note">${p.note}</div>` : ''}
          <div class="card-tags">${p.tag}</div>
        </div>
        <button class="fav-btn" title="Aggiungi ai preferiti" aria-label="Aggiungi ai preferiti">${fav?'★':'☆'}</button>
      `;
      card.querySelector('.fav-btn').onclick = ()=>toggleFavorite(p.id);
      listEl.appendChild(card);
    });
  }

  if(leafletMap && markersLayer){
    markersLayer.clearLayers();
    items.forEach(p=>{
      if(!p.lat || !p.lng) return;
      const fav = !!state.favorites[p.id];
      const color = fav ? '#B0862A' : '#A13F27';
      const marker = L.circleMarker([p.lat, p.lng], {
        radius: 7,
        color: '#241C15',
        weight: 1.5,
        fillColor: color,
        fillOpacity: 0.9
      });
      const popupDiv = document.createElement('div');
      popupDiv.innerHTML = `
        <div class="popup-name">${p.n}</div>
        <div class="popup-meta">${p.z}</div>
        ${p.note ? `<div class="popup-note">${p.note}</div>` : ''}
        <button class="popup-fav ${fav?'on':''}">${fav?'★ Nei preferiti':'☆ Aggiungi ai preferiti'}</button>
      `;
      popupDiv.querySelector('.popup-fav').onclick = ()=>{ toggleFavorite(p.id); };
      marker.bindPopup(popupDiv);
      marker.addTo(markersLayer);
    });
  }
}

// ---------- PUBLIC "SUGGEST A PLACE" FORM ----------
// Replace with your own address before publishing the site.
const SUGGESTION_EMAIL = 'nicholas.caggiula.w@gmail.com';

const suggestOverlay = document.getElementById('suggestOverlay');
const sCatBox = document.getElementById('sCatBox');
const sZone = document.getElementById('sZone');
const sName = document.getElementById('sName');
const sNote = document.getElementById('sNote');
const sFrom = document.getElementById('sFrom');
const sSend = document.getElementById('sSend');
const sCancel = document.getElementById('sCancel');

CATS.filter(c=>c.id!=='all').forEach(c=>{
  const label = document.createElement('label');
  label.className = 'cat-chk';
  label.innerHTML = `<input type="checkbox" value="${c.id}"> ${c.label}`;
  const input = label.querySelector('input');
  input.addEventListener('change', ()=> label.classList.toggle('checked', input.checked));
  sCatBox.appendChild(label);
});
ZONES.forEach(z=>{
  const o=document.createElement('option'); o.value=z; o.textContent=z;
  sZone.appendChild(o);
});

function openSuggest(){
  sName.value = '';
  sNote.value = '';
  sFrom.value = '';
  sZone.value = 'Altre zone';
  [...sCatBox.querySelectorAll('input')].forEach(i=>{ i.checked=false; i.closest('.cat-chk').classList.remove('checked'); });
  suggestOverlay.classList.add('active');
  setTimeout(()=>sName.focus(), 50);
}
function closeSuggest(){ suggestOverlay.classList.remove('active'); }
suggestOverlay.addEventListener('click', e=>{ if(e.target===suggestOverlay) closeSuggest(); });
sCancel.onclick = closeSuggest;
document.getElementById('btnSuggest').onclick = openSuggest;

sSend.onclick = ()=>{
  const name = sName.value.trim();
  if(!name){ sName.focus(); return; }
  const cats = [...sCatBox.querySelectorAll('input')].filter(i=>i.checked).map(i=>{
    const c = CATS.find(c=>c.id===i.value); return c ? c.label : i.value;
  });
  const zone = sZone.value;
  const note = sNote.value.trim();
  const from = sFrom.value.trim();

  const bodyLines = [
    'Nome: ' + name,
    'Categorie: ' + (cats.length ? cats.join(', ') : '(nessuna indicata)'),
    'Zona: ' + zone,
    'Nota: ' + (note || '(nessuna)'),
    'Proposto da: ' + (from || '(anonimo)')
  ];
  const subject = encodeURIComponent('Proposta posto Roma: ' + name);
  const body = encodeURIComponent(bodyLines.join('\n'));
  window.location.href = `mailto:${SUGGESTION_EMAIL}?subject=${subject}&body=${body}`;
  closeSuggest();
};

loadAllData();
</script>
